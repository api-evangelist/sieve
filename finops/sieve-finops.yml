meters:
- name: media_minutes_processed
  description: Minutes of media processed by per-minute solution apps (e.g. dubbing, lipsync, background removal, SAM 2), billed per minute.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - function
- name: media_hours_processed
  description: Hours of media processed by per-hour solution apps (e.g. transcription, audio enhance, autocrop, active speaker detection), billed per hour.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - function
- name: compute_seconds
  description: Seconds of compute used by public apps and custom functions, priced per second by the GPU/CPU hardware tier the function runs on.
  unit: seconds
  aggregation: sum
  dimensions:
  - account
  - function
  - hardware
- name: free_credit
  description: $20 of free credit applied against usage on the Starter plan.
  unit: credit
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Inspect per-job and per-function spend in the Sieve dashboard; map media minutes/hours and compute seconds to workloads.
- name: Allocation
  description: Tag jobs per workload/team and map functions and hardware tiers to internal cost centers.
- name: Optimization
  description: Choose cheaper hardware tiers (T4/L4/CPU over A100) for custom functions; pick the lower-cost voice/model variant of a solution app; trim input media duration; cache or reuse outputs.
- name: Accountability
  description: Assign owners per project/key; review per-function spend monthly against budget and use Production usage discounts at scale.
