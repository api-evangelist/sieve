description: >-
  FinOps view of Sieve spend. Sieve bills usage-based: prebuilt solution apps
  are metered per minute or per hour of media processed (e.g. dubbing per
  minute, transcription per hour), while other public apps and custom functions
  are metered per second of compute on the underlying GPU/CPU hardware. Spend is
  driven by media duration, the app/function chosen, and the hardware tier the
  function runs on.
notes: >-
  Per-app and per-hardware rates are subject to change; verify against the Sieve
  pricing page during reconciliation.
sources:
- https://www.sievedata.com/pricing
- https://docs.sievedata.com
- https://focus.finops.org/focus-specification/v1-3/
