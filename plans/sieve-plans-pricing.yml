specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sieve
providerId: sieve
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- AI
- Video
- Audio
- Media Processing
- Async Jobs
- Plans
description: >-
  Sieve uses a usage-based, pay-as-you-go pricing model. The Starter plan is
  $0/month plus usage with $20 of free credit and up to 3 concurrent requests;
  the Production plan is custom-priced with usage discounts, custom concurrency,
  and 24x7 support. Prebuilt solution apps are billed per minute or per hour of
  media processed; other public apps and custom functions are billed per second
  of compute used, priced by the GPU/CPU hardware the function runs on.
notes: >-
  Representative app and compute rates as published on the Sieve pricing page;
  per-app prices vary by selected voice, model, and translation engine. Check
  the pricing page for the current full catalog and rates.
sources:
- https://www.sievedata.com/pricing
- https://docs.sievedata.com
